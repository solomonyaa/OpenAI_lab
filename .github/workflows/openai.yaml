name: Run OpenAI Script

on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Connect kubectl to EKS
        run: aws eks update-kubeconfig --region us-east-1 --name solomon-eks

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t solomony/openai-flask:v1 .
          docker push solomony/openai-flask:v1

      - name: Create OpenAI secret in EKS
        run: |
          kubectl delete secret openai-secret --ignore-not-found
          kubectl create secret generic openai-secret \
            --from-literal=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

      - name: Deploy to EKS
        run: |
          kubectl apply -f openai-deployment.yaml
          kubectl apply -f service.yaml